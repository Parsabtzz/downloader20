name: دانلود، تقسیم و آپلود به ریپازیتوری

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک فایل'
        required: true

jobs:
  download-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download file
        run: curl -L -o bigfile "${{ github.event.inputs.url }}"

      - name: Split into 90MB parts
        run: |
          mkdir -p split_parts
          split -b 90m -d -a 3 bigfile split_parts/part_

      - name: Commit and push parts to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add split_parts/
          git commit -m "اضافه کردن قطعات فایل" || echo "No changes to commit"
          git push